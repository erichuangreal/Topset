# Server
server.port=${PORT:8002}

# DataSource — override via DATABASE_URL env var or individual vars
spring.datasource.url=${DB_URL:jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:lifting}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USER:lifting_app}
spring.datasource.password=${DB_PASS:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate — validate schema (Flyway owns DDL)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# Preserve exact names from @Table/@Column/@JoinColumn — no camelCase→snake_case conversion
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Flyway — runs migrations from classpath:db/migration automatically
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Logging
logging.level.org.springframework.web=INFO
logging.level.com.topset=DEBUG
