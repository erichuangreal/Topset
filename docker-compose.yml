version: '3.8'

services:
  # MySQL Database
  db:
    image: mysql:8.0
    container_name: topset-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: lifting
      MYSQL_USER: lifting_app
      MYSQL_PASSWORD: lifting_password
    ports:
      - "3406:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API (Java / Spring Boot)
  backend-java:
    build:
      context: ./backend-java
      dockerfile: Dockerfile
    container_name: topset-backend-java
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: lifting
      DB_USER: lifting_app
      DB_PASS: lifting_password
      PORT: 8002
    ports:
      - "8002:8002"
    depends_on:
      db:
        condition: service_healthy

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:8002
    container_name: topset-frontend
    restart: unless-stopped
    ports:
      - "5273:80"
    depends_on:
      - backend-java

volumes:
  mysql_data:
